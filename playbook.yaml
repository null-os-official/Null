# Null OS does NOT use playbook.yaml.
#
# AME Wizard Beta ignores this file. The real playbook is:
#
#   playbook.conf            XML manifest + the feature-toggle GUI
#                            (CheckboxPage / RadioPage). Metadata only.
#
#   Configuration/main.yml   The execution engine AME actually runs.
#                            Every action is gated on a feature Name from
#                            playbook.conf via `option:`.
#
#   Configuration/*.reg      Imported by main.yml (`reg.exe import`).
#   Scripts/*.ps1            Launched by main.yml (`powershell -File`).
#
# Loose .reg / .ps1 files do not execute on their own under AME - they only
# run because main.yml invokes them. Build the shipping .apbx with build.ps1.
#
# This file is kept as a signpost; it can be deleted with no effect.
