title: 'Null OS'

# AME Wizard Beta execution entry point. AME runs this file.
# Every action is gated on a feature <Name> from playbook.conf via `option:`.
#   option: 'X'   -> run only if X is checked.
#   option: '!X'  -> run only if X is unchecked.
# Paths resolve relative to the extracted playbook root. The reg imports and
# script launches below are what make Configuration\*.reg and Scripts\*.ps1
# actually execute - without them those files are inert.

actions:

  # ===========================================================================
  # 0. ROLLBACK SAFETY NET - always first, never gated.
  # ===========================================================================
  - !run:
      exe: 'powershell.exe'
      args: '-NoProfile -ExecutionPolicy Bypass -File "Scripts\Backup-Restore.ps1"'
      runas: trustedInstaller
      wait: true

  # ===========================================================================
  # 1. TELEMETRY
  # ===========================================================================
  - !run:
      exe: 'reg.exe'
      args: 'import "Configuration\Telemetry.reg"'
      runas: trustedInstaller
      wait: true
      option: 'Telemetry'

  - !service: { name: 'DiagTrack', startup: 4, operation: change, option: 'Telemetry' }
  - !service: { name: 'dmwappushservice', startup: 4, operation: change, option: 'Telemetry' }

  - !scheduledTask: { path: '\Microsoft\Windows\Application Experience\Microsoft Compatibility Appraiser', operation: delete, option: 'Telemetry' }
  - !scheduledTask: { path: '\Microsoft\Windows\Application Experience\ProgramDataUpdater', operation: delete, option: 'Telemetry' }
  - !scheduledTask: { path: '\Microsoft\Windows\Application Experience\StartupAppTask', operation: delete, option: 'Telemetry' }
  - !scheduledTask: { path: '\Microsoft\Windows\Customer Experience Improvement Program\Consolidator', operation: delete, option: 'Telemetry' }
  - !scheduledTask: { path: '\Microsoft\Windows\Customer Experience Improvement Program\UsbCeip', operation: delete, option: 'Telemetry' }
  - !scheduledTask: { path: '\Microsoft\Windows\Autochk\Proxy', operation: delete, option: 'Telemetry' }
  - !scheduledTask: { path: '\Microsoft\Windows\Feedback\Siuf\DmClient', operation: delete, option: 'Telemetry' }
  - !scheduledTask: { path: '\Microsoft\Windows\Feedback\Siuf\DmClientOnScenarioDownload', operation: delete, option: 'Telemetry' }
  - !scheduledTask: { path: '\Microsoft\Windows\Windows Error Reporting\QueueReporting', operation: delete, option: 'Telemetry' }

  # ===========================================================================
  # 2. PRIVACY
  # ===========================================================================
  - !run:
      exe: 'reg.exe'
      args: 'import "Configuration\Privacy.reg"'
      runas: trustedInstaller
      wait: true
      option: 'Privacy'

  # ===========================================================================
  # 3. SERVICE CULL (bulk static list)
  # ===========================================================================
  - !run:
      exe: 'reg.exe'
      args: 'import "Configuration\Services.reg"'
      runas: trustedInstaller
      wait: true
      option: 'ServiceCull'

  # ===========================================================================
  # 4. VISUAL EFFECTS
  # ===========================================================================
  - !run:
      exe: 'reg.exe'
      args: 'import "Configuration\VisualFX.reg"'
      runas: trustedInstaller
      wait: true
      option: 'VisualFX'

  # ===========================================================================
  # 5. BLOATWARE
  # ===========================================================================
  - !run:
      exe: 'powershell.exe'
      args: '-NoProfile -ExecutionPolicy Bypass -File "Scripts\RemoveBloatware.ps1"'
      runas: trustedInstaller
      wait: true
      option: 'Debloat'

  # Xbox UWP removed only if "Keep Xbox" is UNCHECKED. GamingServices / Xbox
  # identity provider are never targeted (gaming deps).
  - !appx: { name: '*XboxGamingOverlay*', operation: remove, type: family, option: '!KeepXbox' }
  - !appx: { name: '*XboxGameOverlay*', operation: remove, type: family, option: '!KeepXbox' }
  - !appx: { name: '*Xbox.TCUI*', operation: remove, type: family, option: '!KeepXbox' }
  - !appx: { name: '*XboxSpeechToTextOverlay*', operation: remove, type: family, option: '!KeepXbox' }
  - !appx: { name: '*GamingApp*', operation: remove, type: family, option: '!KeepXbox' }

  # ===========================================================================
  # 6. HARDWARE SERVICE TOGGLES (inverse-gated)
  # ===========================================================================
  - !service: { name: 'bthserv', startup: 4, operation: change, option: '!KeepBluetooth' }
  - !service: { name: 'BTAGService', startup: 4, operation: change, option: '!KeepBluetooth' }
  - !service: { name: 'Spooler', startup: 4, operation: change, option: '!KeepPrintSpooler' }
  - !service: { name: 'PrintNotify', startup: 4, operation: change, option: '!KeepPrintSpooler' }

  # ===========================================================================
  # 7. DISK FOOTPRINT (WinSxS)
  # ===========================================================================
  - !run:
      exe: 'powershell.exe'
      args: '-NoProfile -ExecutionPolicy Bypass -File "Scripts\GutWinSxS.ps1" -Mode Cleanup'
      runas: trustedInstaller
      wait: true
      option: 'GutWinSxS'

  - !run:
      exe: 'powershell.exe'
      args: '-NoProfile -ExecutionPolicy Bypass -File "Scripts\GutWinSxS.ps1" -Mode ResetBase'
      runas: trustedInstaller
      wait: true
      option: 'GutWinSxSResetBase'

  # ===========================================================================
  # 8. KERNEL / BOOT TUNING
  #   Two entries so single-condition gating covers all combinations:
  #   - KernelTweaks checked        -> BCD + kernel reg (no mitigations)
  #   - DisableMitigations checked  -> same + mitigations/VBS off
  #   Both checked -> runs twice; idempotent, harmless.
  # ===========================================================================
  - !run:
      exe: 'powershell.exe'
      args: '-NoProfile -ExecutionPolicy Bypass -File "Scripts\KernelTweaks.ps1"'
      runas: trustedInstaller
      wait: true
      option: 'KernelTweaks'

  - !run:
      exe: 'powershell.exe'
      args: '-NoProfile -ExecutionPolicy Bypass -File "Scripts\KernelTweaks.ps1" -DisableMitigations'
      runas: trustedInstaller
      wait: true
      option: 'DisableMitigations'

  # ===========================================================================
  # 9. LATENCY PROFILE (radio)
  # ===========================================================================
  - !run:
      exe: 'powershell.exe'
      args: '-NoProfile -ExecutionPolicy Bypass -File "Scripts\OptimizeLatency.ps1" -Profile Balanced'
      runas: trustedInstaller
      wait: true
      option: 'LatencyBalanced'

  - !run:
      exe: 'powershell.exe'
      args: '-NoProfile -ExecutionPolicy Bypass -File "Scripts\OptimizeLatency.ps1" -Profile Extreme'
      runas: trustedInstaller
      wait: true
      option: 'LatencyExtreme'

  # ===========================================================================
  # 10. DANGER ZONE (off by default in playbook.conf)
  # ===========================================================================

  # Defender - soft policy disable (needs Tamper Protection already OFF, else
  # silently reverted). Not file removal - avoids an unprotected/unbootable box.
  - !run:
      exe: 'reg.exe'
      args: 'add "HKLM\SOFTWARE\Policies\Microsoft\Windows Defender" /v DisableAntiSpyware /t REG_DWORD /d 1 /f'
      runas: trustedInstaller
      wait: true
      option: 'DisableDefender'

  - !run:
      exe: 'reg.exe'
      args: 'add "HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection" /v DisableRealtimeMonitoring /t REG_DWORD /d 1 /f'
      runas: trustedInstaller
      wait: true
      option: 'DisableDefender'

  # Windows Update - disable services + block auto-download policy.
  - !service: { name: 'wuauserv', startup: 4, operation: change, option: 'DisableWindowsUpdate' }
  - !service: { name: 'UsoSvc', startup: 4, operation: change, option: 'DisableWindowsUpdate' }
  - !service: { name: 'WaaSMedicSvc', startup: 4, operation: change, option: 'DisableWindowsUpdate' }

  - !run:
      exe: 'reg.exe'
      args: 'add "HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU" /v NoAutoUpdate /t REG_DWORD /d 1 /f'
      runas: trustedInstaller
      wait: true
      option: 'DisableWindowsUpdate'
