---
title: Null OS
description: Null OS root playbook - AME Wizard Beta entry point (self-contained)
# Self-contained on purpose. AME's launched-process working directory (exeDir)
# is invalid under the TrustedInstaller node on this engine, so reg-import and
# external .ps1 launches fail with "the directory name is invalid". Everything
# here uses only forms proven to work: native directives (!registryValue,
# !service, !appx, !scheduledTask) and inline !powerShell with NO exeDir.
# Each action is gated on a feature <Name> from playbook.conf via `option:`.
actions:

  # ===========================================================================
  # 0. ROLLBACK SAFETY NET (restore point + raw reg/BCD backup)
  # ===========================================================================
  - !writeStatus: {status: 'Null OS: creating restore point and backups'}
  - !powerShell:
    wait: true
    command: |
      try {
        Enable-ComputerRestore -Drive "$env:SystemDrive\" -ErrorAction Stop
        New-Item -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\SystemRestore' -Force -ErrorAction SilentlyContinue | Out-Null
        New-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\SystemRestore' -Name 'SystemRestorePointCreationFrequency' -Value 0 -PropertyType DWord -Force -ErrorAction SilentlyContinue | Out-Null
        Checkpoint-Computer -Description 'Null OS Pre-Apply' -RestorePointType 'MODIFY_SETTINGS' -ErrorAction Stop
      } catch { Write-Output "restore point skipped: $($_.Exception.Message)" }
      $b = "$env:SystemDrive\NullOS-Backup"
      New-Item -ItemType Directory -Path $b -Force -ErrorAction SilentlyContinue | Out-Null
      reg export 'HKLM\SYSTEM\CurrentControlSet\Services' "$b\services.reg" /y 2>$null
      reg export 'HKLM\SOFTWARE\Policies\Microsoft\Windows' "$b\policies.reg" /y 2>$null
      bcdedit /export "$b\bcd.bak" 2>$null
      Write-Output "Backups in $b"

  # Load the default user hive so per-user changes also reach NEW accounts.
  - !powerShell: {wait: true, command: 'reg load HKU\AME_UserHive_Default C:\Users\Default\NTUSER.DAT'}

  # ===========================================================================
  # 1. TELEMETRY
  # ===========================================================================
  - !writeStatus: {status: 'Removing telemetry and diagnostics'}
  - !service: {name: 'DiagTrack', operation: stop, ignoreErrors: true, option: 'Telemetry'}

  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection', value: 'AllowTelemetry', data: '0', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection', value: 'MaxTelemetryAllowed', data: '0', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection', value: 'DoNotShowFeedbackNotifications', data: '1', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection', value: 'AllowDeviceNameInTelemetry', data: '0', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection', value: 'DisableOneSettingsDownloads', data: '1', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\DataCollection', value: 'AllowTelemetry', data: '0', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Policies\DataCollection', value: 'AllowTelemetry', data: '0', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\WMI\Autologger\AutoLogger-Diagtrack-Listener', value: 'Start', data: '0', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\WMI\Autologger\Diagtrack-Listener', value: 'Start', data: '0', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Diagnostics\DiagTrack\EventTranscriptKey', value: 'EnableEventTranscript', data: '0', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\SQMClient\Windows', value: 'CEIPEnable', data: '0', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\AppCompat', value: 'AITEnable', data: '0', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\AppCompat', value: 'DisableInventory', data: '1', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting', value: 'Disabled', data: '1', type: REG_DWORD, option: 'Telemetry'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Windows Error Reporting', value: 'Disabled', data: '1', type: REG_DWORD, option: 'Telemetry'}

  - !service: {name: 'DiagTrack', operation: change, startup: 4, ignoreErrors: true, option: 'Telemetry'}
  - !service: {name: 'dmwappushservice', operation: change, startup: 4, ignoreErrors: true, option: 'Telemetry'}

  - !scheduledTask: {path: '\Microsoft\Windows\Application Experience\Microsoft Compatibility Appraiser', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Application Experience\ProgramDataUpdater', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Application Experience\StartupAppTask', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Customer Experience Improvement Program\Consolidator', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Customer Experience Improvement Program\UsbCeip', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Autochk\Proxy', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Feedback\Siuf\DmClient', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Feedback\Siuf\DmClientOnScenarioDownload', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Windows Error Reporting\QueueReporting', operation: disable, ignoreErrors: true, option: 'Telemetry'}

  # NVIDIA: kill background/telemetry/update workers; KEEP the display container.
  # NvContainerLocalSystem drives Optimus/display switching - disabling it can
  # black-screen a hybrid-graphics laptop, so it is deliberately preserved.
  - !registryValue: {path: 'HKCU\SOFTWARE\NVIDIA Corporation\NVControlPanel2\Client', value: 'OptInOrOutPreference', data: '0', type: REG_DWORD, option: 'Telemetry'}
  - !service: {name: 'NvTelemetryContainer', operation: change, startup: 4, ignoreErrors: true, option: 'Telemetry'}
  - !service: {name: 'NvContainerNetworkService', operation: change, startup: 4, ignoreErrors: true, option: 'Telemetry'}
  - !powerShell:
    wait: true
    option: 'Telemetry'
    command: |
      # Disable NVIDIA App / GeForce Experience background + updater + telemetry tasks (app stays installed)
      Get-ScheduledTask -EA SilentlyContinue | Where-Object {
        $_.TaskName -match 'NvTm|NvProfileUpdater|NvDriverUpdate|NvBackend|NvNode|GFE|GeForce'
      } | Disable-ScheduledTask -EA SilentlyContinue | Out-Null
      # Global first-time-setup / telemetry opt-out flags (do not uninstall the app)
      New-Item -Path 'HKLM:\SOFTWARE\NVIDIA Corporation\Global\FTS' -Force -EA SilentlyContinue | Out-Null
      New-ItemProperty -Path 'HKLM:\SOFTWARE\NVIDIA Corporation\Global\FTS' -Name 'EnableRID44231' -Value 0 -PropertyType DWord -Force -EA SilentlyContinue | Out-Null
      New-ItemProperty -Path 'HKLM:\SOFTWARE\NVIDIA Corporation\Global\FTS' -Name 'EnableRID64640' -Value 0 -PropertyType DWord -Force -EA SilentlyContinue | Out-Null
      New-ItemProperty -Path 'HKLM:\SOFTWARE\NVIDIA Corporation\Global\FTS' -Name 'EnableRID66610' -Value 0 -PropertyType DWord -Force -EA SilentlyContinue | Out-Null
      Write-Output 'NVIDIA background/telemetry/updater tamed; display container kept'

