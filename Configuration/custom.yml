---
title: Null OS
description: Null OS root playbook - AME Wizard Beta entry point
# AME Wizard runs Configuration\custom.yml by convention. Every action is gated
# on a feature <Name> from playbook.conf via `option:` ('X' = checked, '!X' = unchecked).
#
# Directive forms:
#   reg import / cmd        -> !cmd        (exeDir:true => cwd = playbook root)
#   PowerShell script       -> !powerShell (HKCU resolves to the real user via
#                                           runas: currentUserElevated)
#   direct exe              -> !run
#   single registry value   -> !registryValue
#   service / appx / task   -> !service / !appx / !scheduledTask (run as TI)
actions:

  # ===========================================================================
  # 0. ROLLBACK SAFETY NET - always first, never gated.
  # ===========================================================================
  - !writeStatus: {status: 'Null OS: creating restore point and registry backups'}
  - !powerShell:
    command: '.\Scripts\Backup-Restore.ps1'
    exeDir: true
    wait: true
    runas: currentUserElevated

  # Load the default user hive so per-user privacy changes also apply to NEW
  # accounts created later. Unloaded at the end.
  - !powerShell:
    command: 'reg load HKU\AME_UserHive_Default C:\Users\Default\NTUSER.DAT'
    wait: true

  # ===========================================================================
  # 1. TELEMETRY
  # ===========================================================================
  - !writeStatus: {status: 'Removing telemetry and diagnostics'}
  - !service: {name: 'DiagTrack', operation: stop, ignoreErrors: true, option: 'Telemetry'}
  - !cmd:
    command: 'reg import Configuration\Telemetry.reg'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'Telemetry'

  - !service: {name: 'DiagTrack', operation: change, startup: 4, ignoreErrors: true, option: 'Telemetry'}
  - !service: {name: 'dmwappushservice', operation: change, startup: 4, ignoreErrors: true, option: 'Telemetry'}

  - !scheduledTask: {path: '\Microsoft\Windows\Application Experience\Microsoft Compatibility Appraiser', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Application Experience\ProgramDataUpdater', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Application Experience\StartupAppTask', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Application Experience\PcaPatchDbTask', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Customer Experience Improvement Program\Consolidator', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Customer Experience Improvement Program\UsbCeip', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Autochk\Proxy', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Feedback\Siuf\DmClient', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Feedback\Siuf\DmClientOnScenarioDownload', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\Windows Error Reporting\QueueReporting', operation: disable, ignoreErrors: true, option: 'Telemetry'}
  - !scheduledTask: {path: '\Microsoft\Windows\DiskDiagnostic\Microsoft-Windows-DiskDiagnosticDataCollector', operation: disable, ignoreErrors: true, option: 'Telemetry'}

  # ===========================================================================
  # 2. PRIVACY (current user + default user hive)
  # ===========================================================================
  - !writeStatus: {status: 'Applying privacy lockdown'}
  - !cmd:
    command: 'reg import Configuration\Privacy.reg'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'Privacy'

  - !cmd:
    command: 'reg import Configuration\DefaultUser.reg'
    exeDir: true
    wait: true
    option: 'Privacy'

  # ===========================================================================
  # 2b. NETWORK HARDENING + STACK TUNING
  # ===========================================================================
  - !writeStatus: {status: 'Hardening and tuning the network stack'}
  - !cmd:
    command: 'reg import Configuration\Network.reg'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'Networking'
  - !run: {exe: 'netsh', args: 'advfirewall firewall set rule group="Remote Assistance" new enable=no', option: 'Networking'}

  # ===========================================================================
  # 3. SERVICE CULL (bulk static list)
  # ===========================================================================
  - !writeStatus: {status: 'Culling background services'}
  - !cmd:
    command: 'reg import Configuration\Services.reg'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'ServiceCull'

  # ===========================================================================
  # 4. VISUAL EFFECTS
  # ===========================================================================
  - !writeStatus: {status: 'Trimming visual effects'}
  - !cmd:
    command: 'reg import Configuration\VisualFX.reg'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'VisualFX'

  # ===========================================================================
  # 5. BLOATWARE
  # ===========================================================================
  - !writeStatus: {status: 'Removing bloatware'}
  - !powerShell:
    command: '.\Scripts\RemoveBloatware.ps1'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'Debloat'

  # Xbox UWP removed only if "Keep Xbox" is UNCHECKED. GamingServices / Xbox
  # identity provider are never targeted (gaming deps).
  - !appx: {name: 'Microsoft.XboxGamingOverlay*', type: family, option: '!KeepXbox'}
  - !appx: {name: 'Microsoft.XboxGameOverlay*', type: family, option: '!KeepXbox'}
  - !appx: {name: 'Microsoft.XboxSpeechToTextOverlay*', type: family, option: '!KeepXbox'}
  - !appx: {name: 'Microsoft.GamingApp*', type: family, option: '!KeepXbox'}

  # Clear stale caches (always - cheap, avoids stuck UI surfaces).
  - !appx: {operation: clearCache, name: '*MicrosoftWindows.Client.CBS*'}
  - !appx: {operation: clearCache, name: '*Microsoft.Windows.Search*'}
  - !appx: {operation: clearCache, name: '*Microsoft.Windows.SecHealthUI*'}

  # ===========================================================================
  # 6. HARDWARE SERVICE TOGGLES (inverse-gated)
  # ===========================================================================
  - !service: {name: 'bthserv', operation: change, startup: 4, ignoreErrors: true, option: '!KeepBluetooth'}
  - !service: {name: 'BTAGService', operation: change, startup: 4, ignoreErrors: true, option: '!KeepBluetooth'}
  - !service: {name: 'Spooler', operation: change, startup: 4, ignoreErrors: true, option: '!KeepPrintSpooler'}
  - !service: {name: 'PrintNotify', operation: change, startup: 4, ignoreErrors: true, option: '!KeepPrintSpooler'}

  # ===========================================================================
  # 7. DISK FOOTPRINT (WinSxS)
  # ===========================================================================
  - !writeStatus: {status: 'Reducing disk footprint'}
  - !powerShell:
    command: '.\Scripts\GutWinSxS.ps1 -Mode Cleanup'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'GutWinSxS'

  - !powerShell:
    command: '.\Scripts\GutWinSxS.ps1 -Mode ResetBase'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'GutWinSxSResetBase'

  # ===========================================================================
  # 8. KERNEL / BOOT TUNING
  #   KernelTweaks checked       -> BCD + kernel reg (no mitigations)
  #   DisableMitigations checked -> same + mitigations/VBS off
  #   Both checked -> runs twice; idempotent, harmless.
  # ===========================================================================
  - !writeStatus: {status: 'Applying kernel and boot tuning'}
  - !powerShell:
    command: '.\Scripts\KernelTweaks.ps1'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'KernelTweaks'

  - !powerShell:
    command: '.\Scripts\KernelTweaks.ps1 -DisableMitigations'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'DisableMitigations'

  # ===========================================================================
  # 9. LATENCY PROFILE (radio)
  # ===========================================================================
  - !writeStatus: {status: 'Tuning latency'}
  - !powerShell:
    command: '.\Scripts\OptimizeLatency.ps1 -Profile Balanced'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'LatencyBalanced'

  - !powerShell:
    command: '.\Scripts\OptimizeLatency.ps1 -Profile Extreme'
    exeDir: true
    wait: true
    runas: currentUserElevated
    option: 'LatencyExtreme'

  # ===========================================================================
  # 10. DANGER ZONE (off by default in playbook.conf)
  # ===========================================================================

  # Defender - soft policy disable (needs Tamper Protection already OFF, else
  # silently reverted). Not file removal - keeps the box bootable/recoverable.
  - !registryValue:
    path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender'
    value: 'DisableAntiSpyware'
    data: '1'
    type: REG_DWORD
    option: 'DisableDefender'
  - !registryValue:
    path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection'
    value: 'DisableRealtimeMonitoring'
    data: '1'
    type: REG_DWORD
    option: 'DisableDefender'

  # Windows Update - disable services + block auto-download policy.
  - !service: {name: 'wuauserv', operation: change, startup: 4, ignoreErrors: true, option: 'DisableWindowsUpdate'}
  - !service: {name: 'UsoSvc', operation: change, startup: 4, ignoreErrors: true, option: 'DisableWindowsUpdate'}
  - !service: {name: 'WaaSMedicSvc', operation: change, startup: 4, ignoreErrors: true, option: 'DisableWindowsUpdate'}
  - !registryValue:
    path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU'
    value: 'NoAutoUpdate'
    data: '1'
    type: REG_DWORD
    option: 'DisableWindowsUpdate'

  # ===========================================================================
  # 11. FINALIZE
  # ===========================================================================
  - !powerShell:
    command: 'reg unload HKU\AME_UserHive_Default'
    wait: true
  - !writeStatus: {status: 'Null OS applied - reboot to finish'}
