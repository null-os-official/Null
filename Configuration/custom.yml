  - !service: {name: 'SensorService', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'SensrSvc', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'SensorDataService', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'PhoneSvc', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'TapiSrv', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'SEMgrSvc', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'WalletService', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'SCardSvr', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'ScDeviceEnum', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'CertPropSvc', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
