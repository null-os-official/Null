  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\InputPersonalization', value: 'AllowInputPersonalization', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\CloudContent', value: 'DisableWindowsConsumerFeatures', data: '1', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\CloudContent', value: 'DisableSoftLanding', data: '1', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsCopilot', value: 'TurnOffWindowsCopilot', data: '1', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\location', value: 'Value', data: 'Deny', type: REG_SZ, option: 'Privacy'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\appDiagnostics', value: 'Value', data: 'Deny', type: REG_SZ, option: 'Privacy'}
  # -- Current user --
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\AdvertisingInfo', value: 'Enabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Privacy', value: 'TailoredExperiencesWithDiagnosticDataEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Speech_OneCore\Settings\OnlineSpeechPrivacy', value: 'HasAccepted', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SilentInstalledAppsEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SystemPaneSuggestionsEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SubscribedContentEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'PreInstalledAppsEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'OemPreInstalledAppsEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Siuf\Rules', value: 'NumberOfSIUFInPeriod', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\Explorer', value: 'DisableSearchBoxSuggestions', data: '1', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Search', value: 'BingSearchEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\SearchSettings', value: 'IsAADCloudSearchEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\SearchSettings', value: 'IsMSACloudSearchEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\SearchSettings', value: 'IsDeviceSearchHistoryEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Input\TIPC', value: 'Enabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer', value: 'NoInstrumentation', data: '1', type: REG_DWORD, option: 'Privacy'}
  # -- New users (default hive) --
  - !registryValue: {path: 'HKU\AME_UserHive_Default\SOFTWARE\Microsoft\Windows\CurrentVersion\AdvertisingInfo', value: 'Enabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKU\AME_UserHive_Default\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SilentInstalledAppsEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKU\AME_UserHive_Default\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SubscribedContentEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKU\AME_UserHive_Default\SOFTWARE\Microsoft\Windows\CurrentVersion\Search', value: 'BingSearchEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}
  # -- Recall / Copilot / dynamic lighting --
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI', value: 'DisableAIDataAnalysis', data: '1', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\WindowsAI', value: 'DisableAIDataAnalysis', data: '1', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\WindowsCopilot', value: 'TurnOffWindowsCopilot', data: '1', type: REG_DWORD, option: 'Privacy'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Lighting', value: 'AmbientLightingEnabled', data: '0', type: REG_DWORD, option: 'Privacy'}

  # ===========================================================================
  # 3. NETWORK HARDENING + STACK TUNING
  # ===========================================================================
  - !writeStatus: {status: 'Hardening and tuning the network stack'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient', value: 'EnableMulticast', data: '0', type: REG_DWORD, option: 'Networking'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters', value: 'RestrictNullSessAccess', data: '1', type: REG_DWORD, option: 'Networking'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters', value: 'DisableBandwidthThrottling', data: '1', type: REG_DWORD, option: 'Networking'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Lsa', value: 'RestrictAnonymous', data: '1', type: REG_DWORD, option: 'Networking'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Lsa', value: 'RestrictAnonymousSAM', data: '1', type: REG_DWORD, option: 'Networking'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Remote Assistance', value: 'fAllowToGetHelp', data: '0', type: REG_DWORD, option: 'Networking'}
  - !run: {exe: 'netsh', args: 'advfirewall firewall set rule group="Remote Assistance" new enable=no', option: 'Networking'}

  # ===========================================================================
  # 3b. TELEMETRY HOST BLOCK (opt-in; hosts-file null-route, clearly marked)
  # Firewall-by-hostname is not possible and telemetry IP lists rot, so we use
  # the hosts file only - the reliable, reversible DNS-level lever. Update,
  # activation, licensing, and store domains are deliberately left untouched.
  # ===========================================================================
  - !writeStatus: {status: 'Blocking telemetry domains (if selected)'}
  - !powerShell:
    wait: true
    option: 'BlockTelemetryHosts'
    command: |
      $hosts = "$env:SystemRoot\System32\drivers\etc\hosts"
      $start = '# NULL OS TELEMETRY BLOCK START'
      $end   = '# NULL OS TELEMETRY BLOCK END'
      $domains = @(
        'vortex.data.microsoft.com','vortex-win.data.microsoft.com',
        'telecommand.telemetry.microsoft.com','telemetry.microsoft.com',
        'watson.telemetry.microsoft.com','watson.microsoft.com',
        'oca.telemetry.microsoft.com','sqm.telemetry.microsoft.com',
        'v10.events.data.microsoft.com','v20.events.data.microsoft.com',
        'v10.vortex-win.data.microsoft.com','self.events.data.microsoft.com',
        'eu-v10.events.data.microsoft.com','us-v10.events.data.microsoft.com',
        'settings-win.data.microsoft.com','browser.events.data.msn.com'
      )
      $content = @()
      if (Test-Path $hosts) { $content = Get-Content $hosts -EA SilentlyContinue }
      # Strip any previous Null OS block first so re-runs stay idempotent.
      $clean = @(); $skip = $false
      foreach ($line in $content) {
        if ($line -eq $start) { $skip = $true; continue }
        if ($line -eq $end)   { $skip = $false; continue }
        if (-not $skip) { $clean += $line }
      }
      $block = @($start)
      foreach ($d in $domains) { $block += "0.0.0.0 $d" }
      $block += $end
      Set-Content -Path $hosts -Value ($clean + $block) -Encoding ASCII -Force
      & ipconfig /flushdns | Out-Null
      Write-Output "telemetry hosts block written ($($domains.Count) domains)"

