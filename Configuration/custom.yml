  # ===========================================================================
  # 7b. OEM (LENOVO) TRIM - telemetry/updater/marketing only
  # Explicit keep-list protects the hardware interface + thermal/power backend so
  # Fn+Q performance modes, fan control, and battery conservation still work.
  # ===========================================================================
  - !writeStatus: {status: 'Trimming Lenovo OEM telemetry and bloat'}
  - !appx: {name: 'E0469640.LenovoUtility*', type: family, option: 'OEMDebloat'}
  - !appx: {name: 'E046963F.LenovoSettingsforEnterprise*', type: family, option: 'OEMDebloat'}
  - !appx: {name: 'LenovoCorporation.LenovoID*', type: family, option: 'OEMDebloat'}
  - !appx: {name: '*LenovoNow*', type: family, option: 'OEMDebloat'}
  - !appx: {name: '*AppExplorer*', type: family, option: 'OEMDebloat'}
  - !powerShell:
    wait: true
    option: 'OEMDebloat'
    command: |
      # KEEP-LIST: hardware interface + Vantage thermal/power backend must survive.
      $keep = 'ImControllerService','LenovoVantageService','LenovoVantage'
      # Disable Lenovo telemetry/updater/marketing scheduled tasks (battery/thermal tasks untouched)
      Get-ScheduledTask -EA SilentlyContinue | Where-Object {
        $_.TaskPath -like '*Lenovo*' -and $_.TaskName -match 'Telemetry|Update|Feed|Analytics|Marketing|AppDirector|SmartEngine|Now|Companion'
      } | Disable-ScheduledTask -EA SilentlyContinue | Out-Null
      # Disable Lenovo updater/telemetry/marketing services, never the keep-list
      Get-Service -EA SilentlyContinue | Where-Object {
        ($_.Name -match 'Lenovo|LnvData|SUService|SmartEngine|TabletInputService') -and
        ($keep -notcontains $_.Name) -and
        ($_.Name -match 'Update|Telemetry|Data|SmartEngine|Now|Analytics|SUService|Marketing')
      } | ForEach-Object {
        Set-Service -Name $_.Name -StartupType Disabled -EA SilentlyContinue
        Stop-Service -Name $_.Name -Force -EA SilentlyContinue
      }
      Write-Output 'Lenovo telemetry/updater/marketing trimmed; ImController + Vantage thermal kept'

  # ===========================================================================
  # 8. PERFORMANCE / LATENCY ENGINE (inline; no exeDir)
  # ===========================================================================
  - !writeStatus: {status: 'Applying performance and latency tuning'}
  # Common tuning (applies for both latency profiles).
  - !powerShell:
    wait: true
    command: |
      function S($p,$n,$v,$t='DWord'){ if(-not(Test-Path $p)){New-Item $p -Force|Out-Null}; New-ItemProperty -Path $p -Name $n -Value $v -PropertyType $t -Force -EA SilentlyContinue|Out-Null }
      S 'HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl' 'Win32PrioritySeparation' 38
      & reg add 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile' /v NetworkThrottlingIndex /t REG_DWORD /d 0xffffffff /f | Out-Null
      S 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile' 'SystemResponsiveness' 10
      $g='HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games'
      S $g 'GPU Priority' 8; S $g 'Priority' 6; S $g 'Scheduling Category' 'High' 'String'; S $g 'SFIO Priority' 'High' 'String'
      $ifr='HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters\Interfaces'
      if(Test-Path $ifr){ Get-ChildItem $ifr | ForEach-Object { S $_.PSPath 'TcpAckFrequency' 1; S $_.PSPath 'TCPNoDelay' 1; S $_.PSPath 'TcpDelAckTicks' 0 } }
      Get-ChildItem 'HKLM:\SYSTEM\CurrentControlSet\Services' | Where-Object { $_.Name -notmatch 'Xbl|Xbox' } | ForEach-Object {
        if($null -ne (Get-ItemProperty -Path "Registry::$_" -EA 0).Start){ Set-ItemProperty -Path "Registry::$_" -Name 'SvcHostSplitDisable' -Type DWord -Value 1 -Force -EA 0 } }
      & fsutil behavior set disablelastaccess 1 | Out-Null
      & fsutil 8dot3name set 1 | Out-Null
      if([Environment]::Is64BitOperatingSystem){ & rundll32.exe fthsvc.dll,FthSysprepSpecialize 2>$null }
      S 'HKLM:\SOFTWARE\Microsoft\FTH' 'Enabled' 0
      S 'HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\BackgroundAccessApplications' 'GlobalUserDisabled' 1
      S 'HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Power' 'HiberbootEnabled' 0
      S 'HKLM:\SYSTEM\CurrentControlSet\Control\Power\PowerThrottling' 'PowerThrottlingOff' 1
      S 'HKLM:\SYSTEM\CurrentControlSet\Control\Storage' 'StorageD3InModernStandby' 0
      S 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Task Scheduler\Maintenance' 'WakeUp' 0
      powercfg /setactive SCHEME_MIN
      Write-Output 'common performance tuning done'
  # Extreme-only: full low-latency power scheme + paging off.
  - !powerShell:
    wait: true
    option: 'LatencyExtreme'
    command: |
      function S($p,$n,$v,$t='DWord'){ if(-not(Test-Path $p)){New-Item $p -Force|Out-Null}; New-ItemProperty -Path $p -Name $n -Value $v -PropertyType $t -Force -EA SilentlyContinue|Out-Null }
      S 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile' 'SystemResponsiveness' 0
      $guid='11111111-1111-1111-1111-111111111111'
      if(-not(powercfg /l | Select-String $guid -Quiet)){ powercfg /duplicatescheme e9a42b02-d5df-448d-aa00-03f14749eb61 $guid | Out-Null }
      powercfg /setactive $guid
      powercfg /changename $guid 'Null OS' 'Lowest latency, no power saving.'
      powercfg /setacvalueindex $guid 0012ee47-9041-4b5d-9b77-535fba8b1442 d639518a-e56d-4345-8af2-b9f32fb26109 0
      powercfg /setacvalueindex $guid 2a737441-1930-4402-8d77-b2bebba308a3 48e6b7a6-50f5-4782-a5d4-53bb8f07e226 0
      powercfg /setacvalueindex $guid 54533251-82be-4824-96c1-47b60b740d00 893dee8e-2bef-41e0-89c6-b55d0929964c 100
      powercfg /setacvalueindex $guid 54533251-82be-4824-96c1-47b60b740d00 4d2b0152-7d5c-498b-88e2-34345392a2c5 200
      powercfg /setactive $guid
      S 'HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management' 'DisablePagingExecutive' 1
      S 'HKLM:\SYSTEM\CurrentControlSet\Services\stornvme\Parameters\Device' 'IdlePowerMode' 0
      Write-Output 'extreme power scheme applied'

  # ===========================================================================
  # 9. KERNEL / BOOT TUNING (inline; no exeDir)
  # ===========================================================================
  - !writeStatus: {status: 'Applying kernel and boot tuning'}
  - !powerShell:
    wait: true
    option: 'KernelTweaks'
    command: |
      & bcdedit.exe /set disabledynamictick yes 2>$null
      & bcdedit.exe /set tscsyncpolicy Enhanced 2>$null
      & bcdedit.exe /deletevalue useplatformclock 2>$null
      New-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\kernel' -Name 'DistributeTimers' -Value 1 -PropertyType DWord -Force -EA SilentlyContinue | Out-Null
      Write-Output 'kernel/BCD timer tuning done'
  - !powerShell:
    wait: true
    option: 'DisableMitigations'
    command: |
      $mm='HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management'
      New-ItemProperty -Path $mm -Name 'FeatureSettingsOverride' -Value 3 -PropertyType DWord -Force -EA SilentlyContinue | Out-Null
      New-ItemProperty -Path $mm -Name 'FeatureSettingsOverrideMask' -Value 3 -PropertyType DWord -Force -EA SilentlyContinue | Out-Null
      & bcdedit.exe /set nx OptIn 2>$null
      try { Set-ProcessMitigation -System -Disable CFG -EA SilentlyContinue } catch {}
      foreach($ac in 'valorant','valorant-win64-shipping','vgc','EasyAntiCheat','FACEIT'){ try { Set-ProcessMitigation -Name "$ac.exe" -Enable CFG -EA SilentlyContinue } catch {} }
      $dg='HKLM:\SYSTEM\CurrentControlSet\Control\DeviceGuard'
      New-Item $dg -Force -EA SilentlyContinue | Out-Null
      New-ItemProperty -Path $dg -Name 'EnableVirtualizationBasedSecurity' -Value 0 -PropertyType DWord -Force -EA SilentlyContinue | Out-Null
      Write-Output 'mitigations/VBS disabled (anti-cheat CFG preserved)'

  # ===========================================================================
  # 9b. CORE ISOLATION / VBS + RAM COMPRESSION (opt-in, RAM/CPU wins)
  # ===========================================================================
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\DeviceGuard', value: 'EnableVirtualizationBasedSecurity', data: '0', type: REG_DWORD, option: 'DisableVBS'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\DeviceGuard\Scenarios\HypervisorEnforcedCodeIntegrity', value: 'Enabled', data: '0', type: REG_DWORD, option: 'DisableVBS'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\DeviceGuard\Scenarios\CredentialGuard', value: 'Enabled', data: '0', type: REG_DWORD, option: 'DisableVBS'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\DeviceGuard\Scenarios\KernelShadowStacks', value: 'Enabled', data: '0', type: REG_DWORD, option: 'DisableVBS'}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Lsa', value: 'RunAsPPL', data: '0', type: REG_DWORD, option: 'DisableVBS'}
  - !powerShell:
    wait: true
    option: 'DisableMemoryCompression'
    command: |
      try { Disable-MMAgent -MemoryCompression -ErrorAction Stop; Write-Output 'RAM compression disabled' } catch { Write-Output "mem compression: $($_.Exception.Message)" }

  # ===========================================================================
  # 10. DISK FOOTPRINT (inline DISM; no exeDir)
  # ===========================================================================
  - !writeStatus: {status: 'Reducing disk footprint'}
  - !powerShell:
    wait: true
    option: 'GutWinSxS'
    command: |
      & dism.exe /Online /Remove-Capability /CapabilityName:App.StepsRecorder~~~~0.0.1.0 /NoRestart | Out-Null
      & dism.exe /Online /Cleanup-Image /StartComponentCleanup | Out-Null
      if(Test-Path "$env:SystemDrive\Windows.old"){ & takeown /f "$env:SystemDrive\Windows.old" /r /d y | Out-Null; & icacls "$env:SystemDrive\Windows.old" /grant administrators:F /t /c | Out-Null; Remove-Item "$env:SystemDrive\Windows.old" -Recurse -Force -EA SilentlyContinue }
      Write-Output 'disk cleanup done'
  - !powerShell:
    wait: true
    option: 'GutWinSxSResetBase'
    command: |
      & dism.exe /Online /Cleanup-Image /StartComponentCleanup /ResetBase | Out-Null
      Write-Output 'ResetBase done'

  # ===========================================================================
  # 10c. UPDATE PINNING (block latency-breaking updates without killing security)
  # Defers feature updates 365d and quality updates 4d, and pins the current
  # release so a feature update can't silently swap your build. Security patches
  # still arrive (just not day-one buggy). Combined with the restore point at the
  # top, this is the safe alternative to fully disabling Windows Update.
  # ===========================================================================
  - !writeStatus: {status: 'Pinning Windows build against bad updates'}
  - !powerShell:
    wait: true
    option: 'PinWindowsBuild'
    command: |
      $wu = 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate'
      function S($n,$v,$t='DWord'){ if(-not(Test-Path $wu)){New-Item $wu -Force|Out-Null}; New-ItemProperty -Path $wu -Name $n -Value $v -PropertyType $t -Force -EA SilentlyContinue|Out-Null }
      S 'DeferFeatureUpdates' 1
      S 'DeferFeatureUpdatesPeriodInDays' 365
      S 'DeferQualityUpdates' 1
      S 'DeferQualityUpdatesPeriodInDays' 4
      $rel = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion' -EA SilentlyContinue).DisplayVersion
      if ($rel) {
        S 'TargetReleaseVersion' 1
        S 'TargetReleaseVersionInfo' $rel 'String'
        S 'ProductVersion' 'Windows 11' 'String'
      }
      Write-Output "Build pinned to $rel; quality +4d, feature +365d"

  # ===========================================================================
  # 11. DANGER ZONE (off by default)
  # ===========================================================================
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender', value: 'DisableAntiSpyware', data: '1', type: REG_DWORD, option: 'DisableDefender'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection', value: 'DisableRealtimeMonitoring', data: '1', type: REG_DWORD, option: 'DisableDefender'}
  - !service: {name: 'wuauserv', operation: change, startup: 4, ignoreErrors: true, option: 'DisableWindowsUpdate'}
  - !service: {name: 'UsoSvc', operation: change, startup: 4, ignoreErrors: true, option: 'DisableWindowsUpdate'}
  - !service: {name: 'WaaSMedicSvc', operation: change, startup: 4, ignoreErrors: true, option: 'DisableWindowsUpdate'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU', value: 'NoAutoUpdate', data: '1', type: REG_DWORD, option: 'DisableWindowsUpdate'}

  # ===========================================================================
  # 12. FINALIZE
  # ===========================================================================
  - !powerShell: {wait: true, command: 'reg unload HKU\AME_UserHive_Default'}
  - !writeStatus: {status: 'Null OS applied - reboot to finish'}
