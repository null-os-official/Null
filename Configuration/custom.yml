  - !scheduledTask: {path: '\MicrosoftEdgeUpdateTaskMachineUA', operation: disable, ignoreErrors: true, option: 'Debloat'}
  # Full Edge browser removal (gated separately). WebView2 runtime is preserved so
  # WebView2-dependent apps keep working. Best-effort: Microsoft's region lock can
  # block the uninstaller on some builds - in that case the background/updater are
  # still fully neutralized above, and reinstall is blocked below.
  - !service: {name: 'edgeupdate', operation: change, startup: 4, ignoreErrors: true, option: 'RemoveEdge'}
  - !service: {name: 'edgeupdatem', operation: change, startup: 4, ignoreErrors: true, option: 'RemoveEdge'}
  - !powerShell:
    wait: true
    option: 'RemoveEdge'
    command: |
      # Temporarily allow uninstall (region policy override) then run Edge's own uninstaller system-level
      $reg = 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\IntegratedServicesRegionPolicySet'
      try { New-Item $reg -Force -EA SilentlyContinue | Out-Null; New-ItemProperty -Path $reg -Name 'Microsoft.WindowsLegacyEdge' -Value 1 -PropertyType DWord -Force -EA SilentlyContinue | Out-Null } catch {}
      New-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\EdgeUpdate' -Name 'DoNotUpdateToEdgeWithChromium' -Value 1 -PropertyType DWord -Force -EA SilentlyContinue | Out-Null
      $setup = Get-ChildItem `
        "${env:ProgramFiles(x86)}\Microsoft\Edge\Application\*\Installer\setup.exe", `
        "$env:ProgramFiles\Microsoft\Edge\Application\*\Installer\setup.exe" -EA SilentlyContinue |
        Sort-Object FullName -Descending | Select-Object -First 1
      if ($setup) {
        Start-Process -FilePath $setup.FullName -ArgumentList '--uninstall --system-level --verbose-logging --force-uninstall' -Wait -EA SilentlyContinue
        Write-Output "Edge uninstaller invoked: $($setup.FullName)"
      } else { Write-Output 'Edge setup.exe not found (already removed)' }
      # Deprovision the UWP stub + block reinstall (leave *WebView2* packages alone)
      Get-AppxPackage -AllUsers 'Microsoft.MicrosoftEdge.Stable*' | Remove-AppxPackage -EA SilentlyContinue
      foreach ($k in 'Microsoft.MicrosoftEdge.Stable_8wekyb3d8bbwe','Microsoft.MicrosoftEdge_8wekyb3d8bbwe') {
        New-Item -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Appx\AppxAllUserStore\Deprovisioned\$k" -Force -EA SilentlyContinue | Out-Null
      }
      Write-Output 'Edge removal complete (WebView2 runtime preserved)'
