  - !service: {name: 'NetBT', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'GpuEnergyDrv', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'DoSvc', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'WpnService', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'OneSyncSvc', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'MessagingService', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'CDPSvc', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'DusmSvc', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}
  - !service: {name: 'dmwappushservice', operation: change, startup: 4, ignoreErrors: true, option: 'ServiceCull'}

  # ===========================================================================
  # 4b. FORCE SERVICE-HOST GROUPING (single biggest idle-process-count lever)
  # On >3.5GB RAM Windows splits every service into its own svchost.exe. Raising
  # the split threshold above installed RAM collapses them back into shared
  # hosts - drops 15-25 idle processes on a 16GB machine. Takes effect on reboot.
  # ===========================================================================
  - !writeStatus: {status: 'Forcing service-host grouping (cuts idle process count)'}
  - !powerShell:
    wait: true
    option: 'ForceSvcGrouping'
    command: |
      & reg add 'HKLM\SYSTEM\CurrentControlSet\Control' /v SvcHostSplitThresholdInKB /t REG_DWORD /d 0xffffffff /f | Out-Null
      Write-Output 'svchost split threshold raised - services group on next boot'

  # ===========================================================================
  # 5. VISUAL EFFECTS (animations/transparency off; ClearType + DWM kept)
  # ===========================================================================
