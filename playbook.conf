<?xml version="1.0" encoding="utf-8"?>
<!--
  Null OS - AME Wizard Beta manifest.
  This file is metadata + the feature toggle UI ONLY. No actions live here.
  Execution is driven by Configuration\main.yml, which gates each action on the
  <Name> values defined below (option: 'Name' / inverse option: '!Name').
-->
<Playbook>
  <Name>Null OS</Name>
  <Username>Null OS Official</Username>
  <ShortDescription>Enterprise-tier privacy and low-latency configuration for Windows 11 Pro.</ShortDescription>
  <Title>Null OS</Title>
  <Description>Surgically removes Microsoft telemetry and data collection, locks down privacy policies, strips UWP bloatware, culls 50+ background services, trims visual effects, reduces disk footprint, and tunes the network stack, CPU scheduler, and boot/kernel timer path for minimal DPC/input latency. A System Restore checkpoint and raw registry backups are taken before anything is changed. Core OS surfaces - Explorer, networking, audio, graphics drivers, and gaming dependencies - are preserved. Security-reducing options (Defender, Windows Update, CPU mitigations, ResetBase) are opt-in and off by default.</Description>
  <Version>1.0</Version>
  <UniqueId>a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d</UniqueId>

  <SupportedBuilds>
    <string>22621</string>
    <string>22631</string>
    <string>26100</string>
    <string>26200</string>
  </SupportedBuilds>

  <Requirements>
    <Requirement>NoPendingUpdates</Requirement>
  </Requirements>

  <FeaturePages>

    <CheckboxPage Description="Core modules. Defaults are safe and stable - leave these checked unless you know what you are doing. A restore point is always taken first.">
      <Options>
        <CheckboxOption IsChecked="true">
          <Text>Remove telemetry and diagnostics (DiagTrack, CEIP, Appraiser, error reporting, AppCompat inventory)</Text>
          <Name>Telemetry</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Maximum privacy lockdown (advertising ID, location, activity history, Cortana, Edge telemetry, Bing/web search)</Text>
          <Name>Privacy</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Remove UWP bloatware (Bing apps, Solitaire, Clipchamp, consumer Teams, Copilot, etc.)</Text>
          <Name>Debloat</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Cull 50+ non-essential background services (lowers idle process count and RAM)</Text>
          <Name>ServiceCull</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Trim visual effects - animations and transparency off, ClearType fonts and tear-free DWM kept</Text>
          <Name>VisualFX</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>

    <CheckboxPage Description="Disk footprint and kernel/boot tuning. KernelTweaks applies safe BCD timer changes; the DANGER items below reduce security or servicing ability.">
      <Options>
        <CheckboxOption IsChecked="true">
          <Text>Reduce disk footprint - DISM component cleanup, remove Windows.old, clear update/temp caches</Text>
          <Name>GutWinSxS</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Kernel/boot latency tuning - disable dynamic tick, enhanced TSC sync, distribute timers (no forced HPET)</Text>
          <Name>KernelTweaks</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="false">
          <Text>DANGER: DISM /ResetBase - reclaims more space but removes the ability to uninstall installed updates</Text>
          <Name>GutWinSxSResetBase</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="false">
          <Text>DANGER: disable CPU speculative-execution mitigations (Spectre/Meltdown) and VBS/HVCI for raw gaming throughput</Text>
          <Name>DisableMitigations</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>

    <CheckboxPage Description="Hardware and connectivity. Uncheck to remove the corresponding feature. Defaults preserve functionality.">
      <Options>
        <CheckboxOption IsChecked="true">
          <Text>Keep Bluetooth support</Text>
          <Name>KeepBluetooth</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Keep printing support (Print Spooler)</Text>
          <Name>KeepPrintSpooler</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Keep Xbox / Game Pass apps (gaming dependencies are always kept regardless)</Text>
          <Name>KeepXbox</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>

    <CheckboxPage Description="DANGER ZONE - off by default. These reduce security or break OS update capability. Only enable on a machine where you provide your own equivalent.">
      <Options>
        <CheckboxOption IsChecked="false">
          <Text>Disable Windows Defender (real-time protection + policy). Requires Tamper Protection OFF first. Leave a third-party AV installed.</Text>
          <Name>DisableDefender</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="false">
          <Text>Disable Windows Update (stops all security and driver updates - you become responsible for patching)</Text>
          <Name>DisableWindowsUpdate</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>

    <RadioPage Description="Latency profile. Balanced is safe on laptops and battery. Extreme pins max CPU performance and disables power saving - desktop / plugged-in only.">
      <Options>
        <RadioOption IsChecked="true">
          <Text>Balanced - Nagle off, network throttling off, foreground scheduler boost, high-performance power plan</Text>
          <Name>LatencyBalanced</Name>
        </RadioOption>
        <RadioOption IsChecked="false">
          <Text>Extreme - everything in Balanced, plus DisablePagingExecutive, USB selective-suspend off, processor min state 100%, SystemResponsiveness 0</Text>
          <Name>LatencyExtreme</Name>
        </RadioOption>
      </Options>
    </RadioPage>

  </FeaturePages>
</Playbook>
